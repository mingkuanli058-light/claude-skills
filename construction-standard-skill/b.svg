<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="532" height="448" font-family="Arial, 'Microsoft YaHei', sans-serif">
<defs>
<filter id="drop_shadow" x="-15%" y="-15%" width="130%" height="130%">
  <feDropShadow dx="3" dy="4" stdDeviation="4" flood-color="#00000028"/>
</filter>
<filter id="soft_shadow" x="-10%" y="-10%" width="120%" height="120%">
  <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000020"/>
</filter>
<linearGradient id="fixed_grad" x1="0%" y1="0%" x2="0%" y2="100%">
  <stop offset="0%"   stop-color="#EBF8FF"/>
  <stop offset="100%" stop-color="#63B3ED" stop-opacity="0.5"/>
</linearGradient>
<linearGradient id="room_grad" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%"   stop-color="#F7FAFC"/>
  <stop offset="100%" stop-color="#EDF2F7"/>
</linearGradient>
<radialGradient id="fan_grad_0" cx="0%" cy="50%" r="100%" gradientTransform="rotate(0)">
  <stop offset="0%"   stop-color="#C53030" stop-opacity="0.30"/>
  <stop offset="100%" stop-color="#C53030" stop-opacity="0.03"/>
</radialGradient>
<radialGradient id="fan_grad_1" cx="0%" cy="50%" r="100%" gradientTransform="rotate(0)">
  <stop offset="0%"   stop-color="#2B6CB0" stop-opacity="0.30"/>
  <stop offset="100%" stop-color="#2B6CB0" stop-opacity="0.03"/>
</radialGradient>
<radialGradient id="fan_grad_2" cx="0%" cy="50%" r="100%" gradientTransform="rotate(0)">
  <stop offset="0%"   stop-color="#276749" stop-opacity="0.30"/>
  <stop offset="100%" stop-color="#276749" stop-opacity="0.03"/>
</radialGradient>
<radialGradient id="fan_grad_3" cx="0%" cy="50%" r="100%" gradientTransform="rotate(0)">
  <stop offset="0%"   stop-color="#6B46C1" stop-opacity="0.30"/>
  <stop offset="100%" stop-color="#6B46C1" stop-opacity="0.03"/>
</radialGradient>
<clipPath id="room_clip">
  <rect x="72" y="58" width="240" height="300"/>
</clipPath>
<symbol id="sym_dome" viewBox="-12 -12 24 24" overflow="visible">
  <!-- 外环：currentColor -->
  <circle cx="0" cy="0" r="11" fill="none" stroke="currentColor" stroke-width="2.2"/>
  <!-- 灰色穹顶外壳 -->
  <circle cx="0" cy="0" r="8.5" fill="#4A5568"/>
  <!-- 深色镜头 -->
  <circle cx="0" cy="0" r="5.2" fill="#1A365D"/>
  <!-- 底座 -->
  <rect x="-7" y="5.5" width="14" height="3" rx="1.5" fill="#2D3748"/>
  <!-- 镜头高光 -->
  <circle cx="-1.8" cy="-1.8" r="1.6" fill="white" opacity="0.55"/>
</symbol>
<symbol id="sym_bullet" viewBox="-12 -12 24 24" overflow="visible">
  <!-- 机身 -->
  <rect x="-11" y="-4.5" width="18" height="9" rx="2.5" fill="#4A5568"/>
  <!-- 镜头端盖 -->
  <rect x="5.5" y="-3.5" width="6.5" height="7" rx="2" fill="#2D3748"/>
  <!-- 镜头玻璃 -->
  <circle cx="9" cy="0" r="2.8" fill="#1A365D"/>
  <!-- 安装支架 -->
  <rect x="-3" y="4.5" width="6" height="4.5" rx="1" fill="#2D3748"/>
  <!-- 机身描边：currentColor -->
  <rect x="-11" y="-4.5" width="18" height="9" rx="2.5" fill="none"
        stroke="currentColor" stroke-width="1.8"/>
  <!-- 镜头高光 -->
  <circle cx="8" cy="-1.2" r="0.9" fill="white" opacity="0.6"/>
</symbol>
