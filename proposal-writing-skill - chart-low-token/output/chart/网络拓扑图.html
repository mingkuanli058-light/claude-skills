/** A. 读取图件风格 — 优先 meta.chart_style，默认 presentation */
function getChartStyle(chart) {
  const s = chart.meta && chart.meta.chart_style
  return (s && STYLE_TOKENS[s]) ? s : 'presentation'
}

/** A. 获取风格 token，未知值 fallback 到 presentation */
function getStyleTokens(styleName) {
  return STYLE_TOKENS[styleName] || STYLE_TOKENS.presentation
}

/** D. 图例标准类别名 */
function getTypeDisplayName(type) {
  if (!type) return '节点'
  return TYPE_DISPLAY_NAME[type.toLowerCase()] || type
}

/**

 * 优先在语义词边界前/后断开；退化为平衡拆分；最多两行；避免单字成行
 */
function splitChineseLabel(label) {
  if (!label || label.length <= 8) return [label || '']

  const BREAK_WORDS = [
    '服务器','交换机','数据库','防火墙','录像机',
    '存储','终端','网关','平台','模块','系统',
    '采集','处理','应用','管理','服务',
    '分析','视图','引擎','节点','算力','治理','监测',
  ]

  const mid = label.length / 2
  let bestBreak = -1, bestDist = Infinity

  function tryBreak(pos) {
    if (pos < 2 || pos > label.length - 2) return
    const d = Math.abs(pos - mid)
    if (d < bestDist) { bestDist = d; bestBreak = pos }
  }

  for (const word of BREAK_WORDS) {
    let idx = 0
    while ((idx = label.indexOf(word, idx)) !== -1) {
      tryBreak(idx + word.length)  // 词后断
      tryBreak(idx)                // 词前断
      idx++
    }
  }

  if (bestBreak > 0) {
    const l1 = label.slice(0, bestBreak)
    const l2 = label.slice(bestBreak)
    if (l1.length >= 2 && l2.length >= 2) return [l1, l2]
  }

  // fallback：平衡拆分
  const sp = Math.ceil(label.length / 2)
  return [label.slice(0, sp), label.slice(sp)]
}

/**
 * E. 图种渲染特征
 *   layerBorderW  — 层边框粗细
 *   stepNumbers   — data_flow 步骤编号
 *   networkRegion — network_topology 区域加强虚线
 *   isFlow        — 是否为数据流图（process 节点额外处理）
 */
function getChartTypeRenderMode(chartType) {
  const modes = {
    system_architecture:  { layerBorderW: 0.8, stepNumbers: false, networkRegion: false, isFlow: false, layerDash: null },
    network_topology:     { layerBorderW: 1.2, stepNumbers: false, networkRegion: true,  isFlow: false, layerDash: '10 5' },
    deployment_structure: { layerBorderW: 1.0, stepNumbers: false, networkRegion: false, isFlow: false, layerDash: null },
    data_flow:            { layerBorderW: 0.8, stepNumbers: true,  networkRegion: false, isFlow: true,  layerDash: null },
  }
  return modes[chartType] || modes.system_architecture
}

function getIconId(type) {
  if (!type) return 'ic-server'
  const t = type.toLowerCase().replace(/[\s_]/g, '-')
  return ICON_MAP[t] || ICON_MAP[type.toLowerCase()] || 'ic-server'
}

const NS = 'http://www.w3.org/2000/svg'
function svgEl(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag)
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v)
  return e
}

// ════════════════════════════════════════════════════════════════
//  布局引擎（inline，与 layout_engine.js 一致；接受 pal 参数注入）
// ════════════════════════════════════════════════════════════════
function groupByLayer(nodes, layers) {
  const map = {}
  layers.forEach(l => (map[l] = []))
  nodes.forEach(n => {
    if (n.layer && map[n.layer] !== undefined) map[n.layer].push(n)
  })
  return map
}

function computeVertical(chart, pal) {
  const layers  = chart.layers  || []
  const nodes   = chart.nodes   || []
  const pillars = chart.pillars || []
  const byLayer = groupByLayer(nodes, layers)
  const pillarsW = pillars.length * (PILLAR_W + PILLAR_GAP)
  const usableH = H - TITLE_H - FOOTER_H - PAD_Y * 2
  const layerH  = layers.length > 0 ? usableH / layers.length : usableH
  const pos = {}, layerRects = []

  layers.forEach((name, li) => {
    const lNodes = byLayer[name] || []
    const lp     = pal[li % pal.length]
    const layerY = TITLE_H + PAD_Y + li * layerH
    layerRects.push({ name, x: PAD_X, y: layerY, w: W - PAD_X * 2 - pillarsW, h: layerH - 24, pal: lp, li })
    if (lNodes.length === 0) return
    const mainW  = W - PAD_X * 2 - LAYER_STRIP - pillarsW
    const totalW = lNodes.length * NODE_W + (lNodes.length - 1) * GAP_X
    const startX = PAD_X + LAYER_STRIP + Math.max(0, (mainW - totalW) / 2)
    const innerPadV = Math.max(16, layerH * 0.10)
    const nodeY     = layerY + innerPadV + (layerH - innerPadV * 2 - NODE_H) * 0.38
    lNodes.forEach((n, ni) => {
      pos[n.id] = { x: startX + ni * (NODE_W + GAP_X), y: nodeY, w: NODE_W, h: NODE_H }
    })
  })
  return { pos, layerRects, layoutType: 'vertical' }
}

function computeHorizontal(chart, pal) {
  const layers  = chart.layers || []
  const nodes   = chart.nodes  || []
  const byLayer = groupByLayer(nodes, layers)
  const usableW = W - PAD_X * 2
  const usableH = H - TITLE_H - FOOTER_H - PAD_Y * 2 - 40
  const zoneW   = layers.length > 0 ? usableW / layers.length : usableW
  const pos = {}, layerRects = []

  layers.forEach((name, li) => {
    const lNodes = byLayer[name] || []
    const lp     = pal[li % pal.length]
    const zoneX  = PAD_X + li * zoneW
    const zoneY  = TITLE_H + PAD_Y + 40
    layerRects.push({ name, x: zoneX + 5, y: zoneY, w: zoneW - 10, h: usableH, pal: lp, li, horizontal: true })
    if (lNodes.length === 0) return
    const totalH = lNodes.length * NODE_H + (lNodes.length - 1) * GAP_Y
    const startY = zoneY + 48 + (usableH - 48 - totalH) / 2
    const nodeX  = zoneX + (zoneW - NODE_W) / 2
    lNodes.forEach((n, ni) => {
      pos[n.id] = { x: nodeX, y: startY + ni * (NODE_H + GAP_Y), w: NODE_W, h: NODE_H }
    })
  })
  return { pos, layerRects, layoutType: 'horizontal' }
}

function computeAuto(chart) {
  const nodes = chart.nodes || []
  const count = nodes.length
  const cols  = Math.max(1, Math.ceil(Math.sqrt(count * 1.5)))
  const rows  = Math.max(1, Math.ceil(count / cols))
  const usableW = W - PAD_X * 2
  const usableH = H - TITLE_H - FOOTER_H - PAD_Y * 2
  const cellW = usableW / cols, cellH = usableH / rows
  const pos = {}
  nodes.forEach((n, i) => {
    const col = i % cols, row = Math.floor(i / cols)
    pos[n.id] = {
      x: PAD_X + col * cellW + (cellW - NODE_W) / 2,
      y: TITLE_H + PAD_Y + row * cellH + (cellH - NODE_H) / 2,
      w: NODE_W, h: NODE_H
    }
  })
  return { pos, layerRects: [], layoutType: 'auto' }
}

function computeLayout(chart, pal) {
  const type   = chart.chart_type || 'system_architecture'
  const layers = chart.layers || []
  if (type === 'deployment_structure') return computeHorizontal(chart, pal)
  if (layers.length === 0)            return computeAuto(chart)
  return computeVertical(chart, pal)
}

// ════════════════════════════════════════════════════════════════
//  三体系纵栏渲染（仅 system_architecture + pillars 字段）
// ════════════════════════════════════════════════════════════════
function renderPillars(svg, pillars, layerRects) {
  if (!pillars || pillars.length === 0 || layerRects.length === 0) return
  const ys    = layerRects.map(lr => lr.y)
  const yBots = layerRects.map(lr => lr.y + lr.h)
  const pillarY = Math.min(...ys)
  const pillarH = Math.max(...yBots) - pillarY
  const totalPW = pillars.length * (PILLAR_W + PILLAR_GAP)
  // 纵栏区域起始 X：从右边距向左偏移（每栏占 PILLAR_W + PILLAR_GAP，最后一栏右边贴齐 W-PAD_X）
  const pillarAreaX = W - PAD_X - totalPW + PILLAR_GAP

  pillars.forEach((name, pi) => {
    const pp = PILLAR_PAL[pi % PILLAR_PAL.length]
    const px = pillarAreaX + pi * (PILLAR_W + PILLAR_GAP)
    // 背景矩形
    svg.appendChild(svgEl('rect', {
      x: px, y: pillarY, width: PILLAR_W, height: pillarH,
      fill: pp.strip, rx: '4', ry: '4'
    }))
    // 旋转文字
    const gEl = svgEl('g', {
      transform: `translate(${px + PILLAR_W / 2},${pillarY + pillarH / 2}) rotate(-90)`
    })
    const lt = svgEl('text', {
      'text-anchor': 'middle', 'dominant-baseline': 'middle',
      fill: pp.text, 'font-size': '14', 'font-weight': 'bold',
      'font-family': '"Microsoft YaHei",Arial,sans-serif',
      'letter-spacing': '3'
    })
    lt.textContent = name
    gEl.appendChild(lt)
    svg.appendChild(gEl)
  })
}

// ════════════════════════════════════════════════════════════════
//  渲染主函数
// ════════════════════════════════════════════════════════════════
function render(chart) {
  document.getElementById('pg-title').textContent = chart.title || '架构图'
  const svg = document.getElementById('svg')

  const styleName  = getChartStyle(chart)
  const tok        = getStyleTokens(styleName)
  const renderMode = getChartTypeRenderMode(chart.chart_type)

  const { pos, layerRects } = computeLayout(chart, tok.layerPal)

  // 层 → pal 映射（节点着色）
  const layerPalMap = {}
  ;(chart.layers || []).forEach((l, i) => {
    layerPalMap[l] = tok.layerPal[i % tok.layerPal.length]
  })

  // ── 1. 白色底板 ─────────────────────────────────────────────
  svg.appendChild(svgEl('rect', { x:0, y:0, width:W, height:H, fill:'#fff' }))

  // ── 2. 标题栏 ────────────────────────────────────────────────
  svg.appendChild(svgEl('rect', { x:0, y:0, width:W, height:TITLE_H, fill: tok.titleBar }))
  const tText = svgEl('text', {
    x: W/2, y: TITLE_H/2 + 1,
    'text-anchor':'middle', 'dominant-baseline':'middle',
    fill: tok.titleText, 'font-size':'30', 'font-weight':'600',
    'font-family':'"Microsoft YaHei","Helvetica Neue",Arial,sans-serif',
    'letter-spacing':'3'
  })
  tText.textContent = chart.title || '系统架构图'
  svg.appendChild(tText)
  svg.appendChild(svgEl('rect', { x:0, y:0, width:8, height:TITLE_H, fill: tok.titleAccent }))

  // ── 3. 层背景 ────────────────────────────────────────────────
  const lbw = String(renderMode.layerBorderW)

  layerRects.forEach(lr => {
    const { x, y, w, h, pal: lp, name, horizontal, li } = lr

    // 层主背景
    const layerRectAttrs = {
      x, y, width:w, height:h,
      fill: lp.bg, stroke: lp.border, 'stroke-width': lbw, rx:'6', ry:'6', 'stroke-opacity': '0.35'
    }
    if (renderMode.layerDash) layerRectAttrs['stroke-dasharray'] = renderMode.layerDash
    svg.appendChild(svgEl('rect', layerRectAttrs))

    if (!horizontal) {
      // 垂直：左侧标签条
      svg.appendChild(svgEl('rect', { x, y, width: LAYER_STRIP, height: h, fill: lp.strip, rx:'4', ry:'4' }))
      svg.appendChild(svgEl('rect', { x: x + LAYER_STRIP - 4, y, width: 4, height: h, fill: lp.strip }))

      // 旋转文字组
      const gEl = svgEl('g', {
        transform: `translate(${x + LAYER_STRIP/2},${y + h/2}) rotate(-90)`
      })

      if (renderMode.stepNumbers) {
        // data_flow：步骤编号 + 层名两行
        const t = svgEl('text', {
          'text-anchor':'middle', 'dominant-baseline':'middle',
          fill: lp.stripText,
          'font-family':'"Microsoft YaHei",Arial,sans-serif',
        })
        const ts1 = svgEl('tspan', { x:'0', dy:'-0.65em', 'font-size':'11', opacity:'0.85' })
        ts1.textContent = String(li + 1).padStart(2, '0')
        const ts2 = svgEl('tspan', { x:'0', dy:'1.3em', 'font-size':'14', 'font-weight':'bold' })
        ts2.textContent = name
        t.appendChild(ts1); t.appendChild(ts2)
        gEl.appendChild(t)
      } else {
        const lt = svgEl('text', {
          'text-anchor':'middle', 'dominant-baseline':'middle',
          fill: lp.stripText, 'font-size':'15', 'font-weight':'bold',
          'font-family':'"Microsoft YaHei",Arial,sans-serif',
          'letter-spacing': renderMode.networkRegion ? '3' : '2'
        })
        lt.textContent = name
        gEl.appendChild(lt)
      }
      svg.appendChild(gEl)

      // network_topology：区域内虚线加强边框
      if (renderMode.networkRegion) {
        svg.appendChild(svgEl('rect', {
          x: x + LAYER_STRIP + 4, y: y + 5,
          width: w - LAYER_STRIP - 9, height: h - 10,
          fill: 'none', stroke: lp.border, 'stroke-width': '0.6',
          'stroke-dasharray': '5 4', rx: '2', opacity: '0.45'
        }))
      }

    } else {
      // 水平（deployment_structure）：顶部标签条
      svg.appendChild(svgEl('rect', { x, y, width: w, height: 40, fill: lp.strip, rx:'4', ry:'4' }))
      svg.appendChild(svgEl('rect', { x, y: y + 34, width: w, height: 8, fill: lp.strip }))
      const lt = svgEl('text', {
        x: x + w/2, y: y + 20,
        'text-anchor':'middle', 'dominant-baseline':'middle',
        fill: lp.stripText, 'font-size':'14', 'font-weight':'600',
        'font-family':'"Microsoft YaHei",Arial,sans-serif', 'letter-spacing':'1'
      })
      lt.textContent = name
      svg.appendChild(lt)
    }
  })

  // ── 3.5 三体系纵栏（pillars / 仅 system_architecture） ────────
  renderPillars(svg, chart.pillars, layerRects)

  // ── 4. Group 边界框 ──────────────────────────────────────────
  ;(chart.groups || []).forEach(g => {
    const gPos = (g.nodes || []).map(id => pos[id]).filter(Boolean)
    if (gPos.length === 0) return
    const xs = gPos.map(p => p.x), ys = gPos.map(p => p.y)
    const x1 = Math.min(...xs) - 14
    const y1 = Math.min(...ys) - 26
    const x2 = Math.max(...xs.map((x, i) => x + (gPos[i].w || NODE_W))) + 14
    const y2 = Math.max(...ys.map((y, i) => y + (gPos[i].h || NODE_H))) + 14
    svg.appendChild(svgEl('rect', {
      x:x1, y:y1, width:x2-x1, height:y2-y1,
      fill: tok.groupFill, stroke: tok.groupStroke, 'stroke-width':'1.5',
      'stroke-dasharray': tok.groupDash, rx:'6'
    }))
    const gl = svgEl('text', {
      x: x1 + 10, y: y1 + 17,
      fill: tok.groupStroke, 'font-size':'12', 'font-weight':'bold',
      'font-family':'"Microsoft YaHei",Arial,sans-serif'
    })
    gl.textContent = g.label || g.id
    svg.appendChild(gl)
  })

  // ── 5. 连线 ──────────────────────────────────────────────────
  ;(chart.links || []).forEach(link => {
    const fp = pos[link.from], tp = pos[link.to]
    if (!fp || !tp) return
    const fw = fp.w || NODE_W, fh = fp.h || NODE_H
    const tw = tp.w || NODE_W, th = tp.h || NODE_H
    const fcx = fp.x + fw/2, fcy = fp.y + fh/2
    const tcx = tp.x + tw/2, tcy = tp.y + th/2
    let x1, y1, x2, y2
    if (Math.abs(fcy - tcy) >= Math.abs(fcx - tcx)) {
      if (fcy < tcy) { x1=fcx; y1=fp.y+fh; x2=tcx; y2=tp.y }
      else           { x1=fcx; y1=fp.y;     x2=tcx; y2=tp.y+th }
    } else {
      if (fcx < tcx) { x1=fp.x+fw; y1=fcy; x2=tp.x;    y2=tcy }
      else           { x1=fp.x;    y1=fcy; x2=tp.x+tw; y2=tcy }
    }
    const dx = Math.abs(x2-x1)*0.45, dy = Math.abs(y2-y1)*0.45
    let cp1x=x1, cp1y=y1, cp2x=x2, cp2y=y2
    if (Math.abs(y1-y2) >= Math.abs(x1-x2)) {
      cp1y = y1 + (y2>y1?dy:-dy); cp2y = y2 - (y2>y1?dy:-dy)
    } else {
      cp1x = x1 + (x2>x1?dx:-dx); cp2x = x2 - (x2>x1?dx:-dx)
    }
    const linkColor = link.color || tok.linkColor
    svg.appendChild(svgEl('path', {
      d: `M ${x1} ${y1} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${x2} ${y2}`,
      fill:'none', stroke: linkColor, 'stroke-width': tok.linkWidth,
      'marker-end': `url(#${tok.arrowMarkerId})`
    }))
    if (link.label) {
      const lbl = svgEl('text', {
        x: (x1+x2)/2, y: (y1+y2)/2 - 7, 'text-anchor':'middle',
        fill: tok.legendText, 'font-size':'11',
        'font-family':'"Microsoft YaHei",Arial,sans-serif'
      })
      lbl.textContent = link.label
      svg.appendChild(lbl)
    }
  })

  // ── 6. 节点 ──────────────────────────────────────────────────
  ;(chart.nodes || []).forEach(n => {
    const p = pos[n.id]
    if (!p) return
    const { x, y, w, h } = p
    const lp      = layerPalMap[n.layer] || tok.layerPal[0]
    const iconId  = getIconId(n.type)
    const accentH = tok.nodeAccentH
    const isFlow  = renderMode.isFlow && n.type === 'process'

    // 节点底板（阴影通过 SVG filter 实现）
    const cardAttrs = {
      x, y, width:w, height:h,
      fill: '#fff', stroke: lp.border,
      'stroke-width': isFlow ? String(Number(tok.nodeBorderW) + 0.5) : tok.nodeBorderW,
      rx:'6'
    }
    if (tok.nodeShadowOpacity > 0) cardAttrs.filter = 'url(#f-ns)'
    svg.appendChild(svgEl('rect', cardAttrs))

    // 顶部强调条
    if (accentH > 0) {
      svg.appendChild(svgEl('rect', { x, y, width: w, height: accentH, fill: lp.border, rx:'5' }))
      if (accentH > 2) {
        svg.appendChild(svgEl('rect', { x, y: y + accentH - 2, width: w, height: 2, fill: lp.border }))
      }
    }

    // data_flow process 节点：左侧竖条（强化流程步骤感）
    if (isFlow) {
      svg.appendChild(svgEl('rect', {
        x, y: y + accentH, width: 3, height: h - accentH, fill: lp.border
      }))
    }

    // 图标
    svg.appendChild(svgEl('use', {
      href: '#' + iconId,
      x: x + w/2 - 14, y: y + 7, width: 28, height: 28,
      style: `stroke:${lp.border};fill:none;color:${lp.border};`
    }))

    // C. 语义断行标签
    const label = n.label || n.id
    const lines  = splitChineseLabel(label)

    if (lines.length === 1) {
      const fs = label.length > 8 ? '11' : (label.length > 6 ? '12' : '13')
      const t = svgEl('text', {
        x: x+w/2, y: y+h-14, 'text-anchor':'middle', 'dominant-baseline':'auto',
        fill:'#1e293b', 'font-size': fs, 'font-weight':'500',
        'font-family':'"Microsoft YaHei",Arial,sans-serif'
      })
      t.textContent = lines[0]
      svg.appendChild(t)
    } else {
      const maxLen = Math.max(lines[0].length, lines[1].length)
      const fs = maxLen > 7 ? '10' : (maxLen > 5 ? '11' : '12')
      const t = svgEl('text', {
        'text-anchor':'middle', fill:'#1e293b', 'font-size': fs, 'font-weight':'500',
        'font-family':'"Microsoft YaHei",Arial,sans-serif'
      })
      const ts1 = svgEl('tspan', { x: x+w/2, y: y+h-25 })
      ts1.textContent = lines[0]
      const ts2 = svgEl('tspan', { x: x+w/2, dy:'1.3em' })
      ts2.textContent = lines[1]
      t.appendChild(ts1); t.appendChild(ts2)
      svg.appendChild(t)
    }
  })

  // ── 7. 底栏 ──────────────────────────────────────────────────
  const footerY = H - FOOTER_H
  svg.appendChild(svgEl('rect', { x:0, y:footerY, width:W, height:FOOTER_H, fill: tok.footerBg }))
  svg.appendChild(svgEl('line', {
    x1:0, y1:footerY, x2:W, y2:footerY, stroke: tok.footerLine, 'stroke-width':'1'
  }))
  const company  = (chart.meta && chart.meta.company) || ''
  const project  = (chart.meta && chart.meta.project) || ''
  const footText = [project, company].filter(Boolean).join('  ·  ')
  if (footText) {
    const fl = svgEl('text', {
      x: PAD_X, y: footerY + FOOTER_H/2, 'dominant-baseline':'middle',
      fill: tok.footerText, 'font-size':'13',
      'font-family':'"Microsoft YaHei",Arial,sans-serif'
    })
    fl.textContent = footText
    svg.appendChild(fl)
  }
  const dateStr = (chart.meta && chart.meta.date) || String(new Date().getFullYear())
  const fr = svgEl('text', {
    x: W - PAD_X, y: footerY + FOOTER_H/2,
    'text-anchor':'end', 'dominant-baseline':'middle',
    fill: tok.footerText, 'font-size':'13',
    'font-family':'"Microsoft YaHei",Arial,sans-serif'
  })
  fr.textContent = dateStr
  svg.appendChild(fr)

  // ── 8. 图例 ──────────────────────────────────────────────────
  renderLegend(svg, chart, tok)
}

// ════════════════════════════════════════════════════════════════
//  D. 图例渲染（标准类别名）
// ════════════════════════════════════════════════════════════════
function renderLegend(svg, chart, tok) {
  const seen = new Set(), types = []
  ;(chart.nodes || []).forEach(n => {
    const key = (n.type || 'server').toLowerCase()
    if (!seen.has(key)) { seen.add(key); types.push(key) }
  })
  if (types.length < 2) return

  const ITEM_W = 110, ITEM_H = 24
  const startX = W - PAD_X - types.length * ITEM_W
  const startY = H - FOOTER_H - ITEM_H - 6

  svg.appendChild(svgEl('rect', {
    x: startX - 8, y: startY - 4,
    width: types.length * ITEM_W + 16, height: ITEM_H + 8,
    fill: tok.legendBg, stroke: tok.legendStroke, 'stroke-width':'1', 'stroke-opacity':'0.3', rx:'3'
  }))

  types.forEach((type, i) => {
    const ix = startX + i * ITEM_W, iy = startY
    svg.appendChild(svgEl('use', {
      href: '#' + getIconId(type), x: ix, y: iy + 2, width: 18, height: 18,
      style: `stroke:${tok.legendText};fill:none;color:${tok.legendText};`
    }))
    const lt = svgEl('text', {
      x: ix + 22, y: iy + ITEM_H/2 + 2, 'dominant-baseline':'middle',
      fill: tok.legendText, 'font-size':'12',
      'font-family':'"Microsoft YaHei",Arial,sans-serif'
    })
    lt.textContent = getTypeDisplayName(type)
    svg.appendChild(lt)
  })
}

// ════════════════════════════════════════════════════════════════
//  甘特图渲染器 (chart_type: gantt / project_gantt)
// ════════════════════════════════════════════════════════════════
function renderGantt(chart) {
  const LABEL_W  = 290
  const CHART_X  = PAD_X + LABEL_W + 12
  const CHART_W  = W - CHART_X - PAD_X - 10
  const MON_Y    = TITLE_H + 8
  const MON_H    = 44
  const ROWS_Y   = MON_Y + MON_H + 4
  const FOOTER_Y = H - FOOTER_H

  const styleName = getChartStyle(chart)
  const tok       = getStyleTokens(styleName)
  const svg       = document.getElementById('svg')
  const tasks     = chart.tasks || []
  const mstones   = chart.milestones || []

  // ── 阶段颜色方案 ──────────────────────────────────────────────
  const PALETTES = {
    presentation: [
      {bar:'#2563eb', pale:'#dbeafe', text:'#1e3a8a'},
      {bar:'#0d9488', pale:'#ccfbf1', text:'#065f46'},
      {bar:'#7c3aed', pale:'#ede9fe', text:'#4c1d95'},
      {bar:'#d97706', pale:'#fef3c7', text:'#78350f'},
      {bar:'#dc2626', pale:'#fee2e2', text:'#7f1d1d'},
      {bar:'#0891b2', pale:'#cffafe', text:'#164e63'},
    ],
    review: [
      {bar:'#4a5568', pale:'#f0f2f4', text:'#2d3748'},
      {bar:'#5a6577', pale:'#eaecef', text:'#2d3748'},
      {bar:'#697282', pale:'#e8eaed', text:'#2d3748'},
      {bar:'#7a8191', pale:'#e4e7eb', text:'#2d3748'},
      {bar:'#8a90a0', pale:'#dde1e6', text:'#2d3748'},
      {bar:'#9aa0b0', pale:'#d8dbe0', text:'#2d3748'},
    ],
    tender: [
      {bar:'#1d4ed8', pale:'#dbeafe', text:'#1e3a8a'},
      {bar:'#059669', pale:'#d1fae5', text:'#064e3b'},
      {bar:'#7c3aed', pale:'#ede9fe', text:'#4c1d95'},
      {bar:'#d97706', pale:'#fef3c7', text:'#78350f'},
      {bar:'#dc2626', pale:'#fee2e2', text:'#7f1d1d'},
      {bar:'#0891b2', pale:'#cffafe', text:'#164e63'},
    ],
  }
  const palArr = PALETTES[styleName] || PALETTES.presentation

  // ── 日期工具 ──────────────────────────────────────────────────
  function parseDate(s) { return new Date(s + 'T00:00:00') }

  const allD = []
  tasks.forEach(t => { allD.push(parseDate(t.start_date)); allD.push(parseDate(t.end_date)) })
  mstones.forEach(m => allD.push(parseDate(m.date)))
  if (allD.length === 0) return

  const tMin = new Date(Math.min(...allD.map(d => d.getTime())))
  const tMax = new Date(Math.max(...allD.map(d => d.getTime())))
  tMin.setDate(tMin.getDate() - 4)
  tMax.setDate(tMax.getDate() + 8)

  const SPAN = Math.ceil((tMax - tMin) / 864e5)
  const dayW = CHART_W / SPAN

  function toX(s) {
    return CHART_X + (parseDate(s) - tMin) / 864e5 * dayW
  }
  function endX(s) {
    const d = parseDate(s)
    d.setDate(d.getDate() + 1)
    return CHART_X + (d - tMin) / 864e5 * dayW
  }

  // ── 阶段索引 ──────────────────────────────────────────────────
  let pIdx = -1
  const tPhase = {}
  tasks.forEach(t => { if (t.milestone) pIdx++; tPhase[t.id] = pIdx })

  // ── 行高计算 ──────────────────────────────────────────────────
  const AVAIL_H = FOOTER_Y - ROWS_Y - 4
  const ROW_H   = Math.min(48, Math.floor(AVAIL_H / Math.max(tasks.length, 1)))
  const BAR_H   = Math.round(ROW_H * 0.54)

  // ── 1. 白色底板 ───────────────────────────────────────────────
  svg.appendChild(svgEl('rect', {x:0, y:0, width:W, height:H, fill:'#fff'}))

  // ── 2. 标题栏 ─────────────────────────────────────────────────
  svg.appendChild(svgEl('rect', {x:0, y:0, width:W, height:TITLE_H, fill:tok.titleBar}))
  const tTxt = svgEl('text', {
    x:W/2, y:TITLE_H/2+1,
    'text-anchor':'middle', 'dominant-baseline':'middle',
    fill:tok.titleText, 'font-size':'30', 'font-weight':'bold',
    'font-family':'"Microsoft YaHei","Helvetica Neue",Arial,sans-serif',
    'letter-spacing':'3'
  })
  tTxt.textContent = chart.title || '实施甘特图'
  svg.appendChild(tTxt)
  svg.appendChild(svgEl('rect', {x:0, y:0, width:8, height:TITLE_H, fill:tok.titleAccent}))

  // ── 3. 左侧表头 ───────────────────────────────────────────────
  svg.appendChild(svgEl('rect', {
    x:PAD_X, y:MON_Y, width:LABEL_W, height:MON_H,
    fill:'#e8eef6', stroke:'#c8d4e8', 'stroke-width':'1'
  }))
  const hLbl = svgEl('text', {
    x:PAD_X+LABEL_W/2, y:MON_Y+MON_H/2,
    'text-anchor':'middle', 'dominant-baseline':'middle',
    fill:'#1e3a8a', 'font-size':'13', 'font-weight':'bold',
    'font-family':'"Microsoft YaHei",Arial,sans-serif'
  })
  hLbl.textContent = '任务名称'
  svg.appendChild(hLbl)

  // ── 4. 月份表头 ───────────────────────────────────────────────
  const MONTH_CN = ['一月','二月','三月','四月','五月','六月',
                    '七月','八月','九月','十月','十一月','十二月']
  let mCur = new Date(tMin.getFullYear(), tMin.getMonth(), 1)
  while (mCur <= tMax) {
    const mNext = new Date(mCur.getFullYear(), mCur.getMonth() + 1, 1)
    const mS    = new Date(Math.max(mCur.getTime(), tMin.getTime()))
    const mE    = new Date(Math.min(mNext.getTime(), tMax.getTime()))
    const x1    = CHART_X + (mS - tMin) / 864e5 * dayW
    const mW    = (mE - mS) / 864e5 * dayW
    if (mW > 8) {
      svg.appendChild(svgEl('rect', {
        x:x1, y:MON_Y, width:mW, height:MON_H,
        fill:'#E8EEF6', stroke:'#C8D4E8', 'stroke-width':'1'
      }))
      const mt = svgEl('text', {
        x:x1+mW/2, y:MON_Y+MON_H/2,
        'text-anchor':'middle', 'dominant-baseline':'middle',
        fill:'#2255AA', 'font-size':'12', 'font-weight':'bold',
        'font-family':'"Microsoft YaHei",Arial,sans-serif'
      })
      mt.textContent = `${mCur.getFullYear()}年${MONTH_CN[mCur.getMonth()]}`
      svg.appendChild(mt)
    }
    mCur = mNext
  }

  // ── 5. 任务行 ─────────────────────────────────────────────────
  tasks.forEach((task, i) => {
    const ry   = ROWS_Y + i * ROW_H
    const pal  = palArr[Math.max(tPhase[task.id], 0) % palArr.length]
    const isPh = !!task.milestone

    // 行背景
    svg.appendChild(svgEl('rect', {
      x:PAD_X, y:ry, width:W-PAD_X*2, height:ROW_H,
      fill: isPh ? pal.pale : (i%2===0 ? '#f8fafc' : '#fff'),
      stroke:'#e2e8f0', 'stroke-width':'0.5'
    }))

    // 阶段色条（左侧竖条）
    if (isPh) {
      svg.appendChild(svgEl('rect', {
        x:PAD_X, y:ry, width:4, height:ROW_H, fill:pal.bar
      }))
    }

    // 任务名称
    const nameX   = isPh ? PAD_X + 10 : PAD_X + 20
    const maxCh   = isPh ? 14 : 16
    const dispNm  = task.name.length > maxCh ? task.name.slice(0, maxCh) + '…' : task.name
    const nm = svgEl('text', {
      x:nameX, y:ry+ROW_H/2,
      'dominant-baseline':'middle',
      fill: isPh ? pal.text : '#334155',
      'font-size': isPh ? '12' : '11',
      'font-weight': isPh ? 'bold' : '400',
      'font-family':'"Microsoft YaHei",Arial,sans-serif'
    })
    nm.textContent = dispNm
    svg.appendChild(nm)

    // 左边界竖线
    svg.appendChild(svgEl('line', {
      x1:CHART_X, y1:ry, x2:CHART_X, y2:ry+ROW_H,
      stroke:'#e2e8f0', 'stroke-width':'1'
    }))

    // 甘特条
    const bx  = toX(task.start_date)
    const bx2 = endX(task.end_date)
    const bw  = Math.max(bx2 - bx, 3)
    const by  = ry + (ROW_H - BAR_H) / 2

    svg.appendChild(svgEl('rect', {
      x:bx, y:by, width:bw, height:BAR_H,
      fill: isPh ? pal.bar : pal.pale,
      stroke:pal.bar, 'stroke-width': isPh ? '0' : '1',
      rx:'3'
    }))

    // 进度填充
    if (task.progress > 0 && !isPh) {
      svg.appendChild(svgEl('rect', {
        x:bx, y:by,
        width:bw * task.progress / 100, height:BAR_H,
        fill:pal.bar, rx:'3', opacity:'0.6'
      }))
    }

    // 条内工期文字
    if (bw > 40) {
      const bt = svgEl('text', {
        x:bx+bw/2, y:by+BAR_H/2,
        'text-anchor':'middle', 'dominant-baseline':'middle',
        fill: isPh ? '#fff' : pal.text,
        'font-size':'10', 'font-weight': isPh ? 'bold' : '400',
        'font-family':'"Microsoft YaHei",Arial,sans-serif'
      })
      bt.textContent = `${task.duration}天`
      svg.appendChild(bt)
    }
  })

  // ── 6. 里程碑竖线 + 菱形标记 ──────────────────────────────────
  mstones.forEach(ms => {
    const mx  = toX(ms.date) + dayW / 2
    const sz  = 8
    const mdy = ROWS_Y - 14

    // 竖虚线
    svg.appendChild(svgEl('line', {
      x1:mx, y1:ROWS_Y, x2:mx, y2:FOOTER_Y - 10,
      stroke:'#C06020', 'stroke-width':'1.2',
      'stroke-dasharray':'4 3', opacity:'0.55'
    }))

    // 菱形
    svg.appendChild(svgEl('polygon', {
      points:`${mx},${mdy-sz} ${mx+sz},${mdy} ${mx},${mdy+sz} ${mx-sz},${mdy}`,
      fill:'#C06020', stroke:'#fff', 'stroke-width':'1'
    }))

    // 标签（旋转45°以避免重叠）
    const gt = svgEl('text', {
      transform:`translate(${mx+4},${mdy+sz+2}) rotate(-40)`,
      'dominant-baseline':'hanging',
      fill:'#C06020', 'font-size':'9',
      'font-family':'"Microsoft YaHei",Arial,sans-serif'
    })
    gt.textContent = ms.name
    svg.appendChild(gt)
  })

  // ── 7. 底栏 ───────────────────────────────────────────────────
  svg.appendChild(svgEl('rect', {x:0, y:FOOTER_Y, width:W, height:FOOTER_H, fill:tok.footerBg}))
  svg.appendChild(svgEl('line', {
    x1:0, y1:FOOTER_Y, x2:W, y2:FOOTER_Y,
    stroke:tok.footerLine, 'stroke-width':'1'
  }))
  const gCompany  = (chart.meta && chart.meta.company) || ''
  const gProject  = (chart.meta && chart.meta.project) || ''
  const gFootText = [gProject, gCompany].filter(Boolean).join('  ·  ')
  if (gFootText) {
    const fl = svgEl('text', {
      x:PAD_X, y:FOOTER_Y+FOOTER_H/2, 'dominant-baseline':'middle',
      fill:tok.footerText, 'font-size':'13',
      'font-family':'"Microsoft YaHei",Arial,sans-serif'
    })
    fl.textContent = gFootText
    svg.appendChild(fl)
  }
  const gDateStr = (chart.meta && chart.meta.date) || String(new Date().getFullYear())
  const fr = svgEl('text', {
    x:W-PAD_X, y:FOOTER_Y+FOOTER_H/2,
    'text-anchor':'end', 'dominant-baseline':'middle',
    fill:tok.footerText, 'font-size':'13',
    'font-family':'"Microsoft YaHei",Arial,sans-serif'
  })
  fr.textContent = gDateStr
  svg.appendChild(fr)
}

// ════════════════════════════════════════════════════════════════
//  PNG 导出（2× 分辨率，能力不变）
// ════════════════════════════════════════════════════════════════
function exportPNG() {
  const svg = document.getElementById('svg')
  const ser = new XMLSerializer()
  let svgStr = ser.serializeToString(svg)
  if (!svgStr.includes('xmlns='))
    svgStr = svgStr.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"')

  const canvas = document.createElement('canvas')
  canvas.width = W * 2; canvas.height = H * 2
  const ctx = canvas.getContext('2d')
  ctx.fillStyle = '#fff'
  ctx.fillRect(0, 0, canvas.width, canvas.height)
  ctx.scale(2, 2)

  const blob = new Blob([svgStr], { type:'image/svg+xml;charset=utf-8' })
  const url  = URL.createObjectURL(blob)
  const img  = new Image()
  img.onload = () => {
    ctx.drawImage(img, 0, 0)
    URL.revokeObjectURL(url)
    const a = document.createElement('a')
    a.download = (chart.title || 'chart') + '.png'
    a.href = canvas.toDataURL('image/png')
    document.body.appendChild(a); a.click(); document.body.removeChild(a)
  }
  img.onerror = () => { URL.revokeObjectURL(url); alert('导出失败，请截图保存。') }
  img.src = url
}

// ════════════════════════════════════════════════════════════════
//  入口
// ════════════════════════════════════════════════════════════════
const chart = JSON.parse(
  document.getElementById('chart-data').textContent.trim()
)
if (chart.chart_type === 'gantt' || chart.chart_type === 'project_gantt') {
  renderGantt(chart)
} else {
  render(chart)
}
</script>
