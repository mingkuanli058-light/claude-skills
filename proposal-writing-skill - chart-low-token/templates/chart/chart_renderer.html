<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Chart Renderer</title>

<style>

body{
margin:0;
background:#f5f6f7;
font-family:"Microsoft YaHei",Arial;
}

#canvas{
width:1920px;
height:1080px;
margin:auto;
background:white;
position:relative;
}

.title{
position:absolute;
top:30px;
width:100%;
text-align:center;
font-size:32px;
font-weight:bold;
}

.node{
position:absolute;
width:180px;
height:70px;
border:2px solid #5a78ff;
background:#f0f4ff;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

svg{
position:absolute;
top:0;
left:0;
}

</style>

</head>

<body>

<div id="canvas">

<div class="title" id="title"></div>

<svg id="links" width="1920" height="1080"></svg>

</div>


<script id="chart-data" type="application/json">

{{chart_data}}

</script>


<script>

const chart = JSON.parse(
document.getElementById("chart-data").textContent
)

document.getElementById("title").innerText = chart.title

const svg = document.getElementById("links")
const canvas = document.getElementById("canvas")

const nodeMap = {}

function render(){

switch(chart.chart_type){

case "network_topology":
renderTopology()
break

case "system_architecture":
renderArchitecture()
break

case "deployment_structure":
renderDeployment()
break

case "data_flow":
renderDataFlow()
break

case "gantt":
renderGantt()
break

}

}

function drawNode(node,x,y){

const div=document.createElement("div")

div.className="node"
div.innerText=node.label

div.style.left=x+"px"
div.style.top=y+"px"

canvas.appendChild(div)

nodeMap[node.id]={x:x,y:y}

}

function drawLink(from,to){

const line=document.createElementNS("http://www.w3.org/2000/svg","line")

line.setAttribute("x1",from.x+90)
line.setAttribute("y1",from.y+70)

line.setAttribute("x2",to.x+90)
line.setAttribute("y2",to.y)

line.setAttribute("stroke","#333")
line.setAttribute("stroke-width","3")

svg.appendChild(line)

}

function renderTopology(){

const layout={}

layout[chart.nodes[0].id]={x:250,y:420}

layout[chart.nodes[1].id]={x:750,y:420}

layout[chart.nodes[2].id]={x:1250,y:250}

layout[chart.nodes[3].id]={x:1250,y:550}

layout[chart.nodes[4].id]={x:750,y:150}

chart.nodes.forEach(n=>{
drawNode(n,layout[n.id].x,layout[n.id].y)
})

chart.links.forEach(l=>{
drawLink(nodeMap[l.from],nodeMap[l.to])
})

}

function renderArchitecture(){

let y=200

chart.nodes.forEach(n=>{
drawNode(n,870,y)
y+=200
})

chart.links.forEach(l=>{
drawLink(nodeMap[l.from],nodeMap[l.to])
})

}

function renderDeployment(){

let x=300

chart.nodes.forEach(n=>{
drawNode(n,x,450)
x+=350
})

chart.links.forEach(l=>{
drawLink(nodeMap[l.from],nodeMap[l.to])
})

}

function renderDataFlow(){

let y=200

chart.nodes.forEach(n=>{
drawNode(n,870,y)
y+=200
})

chart.links.forEach(l=>{
drawLink(nodeMap[l.from],nodeMap[l.to])
})

}

function renderGantt(){

const startX=200
let y=200

chart.nodes.forEach(n=>{

const bar=document.createElement("div")

bar.style.position="absolute"
bar.style.left=startX+"px"
bar.style.top=y+"px"
bar.style.height="40px"
bar.style.width="400px"
bar.style.background="#5a78ff"
bar.style.color="white"
bar.style.display="flex"
bar.style.alignItems="center"
bar.style.paddingLeft="10px"

bar.innerText=n.label

canvas.appendChild(bar)

y+=80

})

}

render()

</script>

</body>
</html>
