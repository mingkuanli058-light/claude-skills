<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1500">
<title>数据流转图 — 北京市公安局涉案财物智能化保管系统</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
  background: #e8ecf1;
  padding: 24px;
  display: flex; align-items: flex-start; justify-content: center;
}
.chart {
  width: 1460px;
  background: #fff;
  border: 1px solid #b0bec5;
  box-shadow: 0 4px 20px rgba(0,0,0,.14);
}
.chart-header {
  background: #1a3a6b;
  color: #fff;
  padding: 16px 24px;
  text-align: center;
  border-bottom: 3px solid #d4a000;
}
.chart-header h1 { font-size: 20px; letter-spacing: 3px; }
.chart-header .sub { font-size: 12px; opacity: .75; margin-top: 5px; }
.chart-body { padding: 20px; }

/* SVG fills chart-body */
.chart-body svg { display: block; width: 100%; }

/* ── Footer ── */
.chart-footer {
  padding: 9px 20px 14px;
  border-top: 1px solid #e0e0e0;
}
.legend {
  display: flex; gap: 24px; margin-bottom: 6px; flex-wrap: wrap;
}
.legend-item {
  display: flex; align-items: center; gap: 7px;
  font-size: 11.5px; color: #444;
}
.l-line {
  width: 36px; height: 2px;
}
.l-solid { background: #1a3a6b; }
.l-dashed {
  height: 0;
  border-top: 2px dashed #9e9e9e;
}
.footnote { font-size: 11px; color: #9e9e9e; font-style: italic; line-height: 1.7; }
.footnote em { color: #c62828; font-style: normal; }
</style>
</head>
<body>
