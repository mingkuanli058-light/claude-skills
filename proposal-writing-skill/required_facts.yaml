facts:

  - name: 需求基线文件
    path: specs/需求.md
    required: true
    cardinality: 1
    description: 唯一事实来源（Single Source of Truth），未存在禁止生成方案

  - name: 技术路线基线
    path: specs/technical_baseline.md
    required: true
    cardinality: 1
    description: 技术路线唯一裁决依据，禁止缺失或由模型推理替代

  - name: 架构范围定义
    path: specs/architecture_scope.md
    required: true
    cardinality: 1
    description: 系统结构与图件生成边界依据

  - name: 投资模型定义
    path: specs/investment_schema.md
    required: true
    cardinality: 1
    description: 投资结构、预算模型与合规计算规则依据

  - name: 章节结构模板
    path: templates.md
    required: true
    cardinality: 1
    description: 建设方案章节结构权威模板

optional_facts:

  - name: 既有建设方案
    path: output/建设方案.md
    required: false
    cardinality: 0-1
    description: 若存在则进入扩写 / 修改模式，而非新建模式